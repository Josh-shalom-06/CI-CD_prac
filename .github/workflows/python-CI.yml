name: Python CI Pipeline

on:
  push:
    branches:
      - main
      - feature

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r req.txt

      - name: Run program
        run: python hello.py
        
      - name: Run Tests
        run: pytest
